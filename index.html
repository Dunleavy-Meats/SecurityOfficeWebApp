<!DOCTYPE html>
<html lang="en">

<head>
    <script type="text/javascript">
        (function(l) {
            if (l.search && l.search.indexOf("?route=") === 0) {
                var route = l.search.slice(7);
                route = route.replace(/~and~/g, "&");
                history.replaceState(null, null,
                    l.pathname.slice(0, -1) + (route ? "/" + route : "") + l.hash
                );
            }
        }(window.location))
    </script>
    <meta charset="utf-8" />
    <title>Dunleavy Security App</title>
    <base href="/SecurityOfficeWebApp/" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="js/firebase.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</head>

<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        // increment this string (e.g., "1.0.1", "1.0.2") every time you deploy a code update
        const DEPLOYED_VERSION = "1.0.2";

        if (localStorage.getItem("app_version_cache") !== DEPLOYED_VERSION) {
            localStorage.setItem("app_version_cache", DEPLOYED_VERSION);

            // 1. Unregister any hidden service workers that might be stuck
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function (registrations) {
                    for (let registration of registrations) {
                        registration.unregister();
                    }
                });
            }

            // 2. Wipe out the browser cache storage where Blazor stores its assemblies (.dll files)
            if ('caches' in window) {
                caches.keys().then(function (cacheNames) {
                    return Promise.all(
                        cacheNames.map(function (cacheName) {
                            return caches.delete(cacheName);
                        })
                    );
                }).then(() => {
                    // 3. Force reload the app completely from the server
                    window.location.reload(true);
                });
            }
        }
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(registration => {
                    console.log('Service Worker registered with scope:', registration.scope);
                })
                .catch(error => {
                    console.warn('Service Worker registration failed:', error);
                });
        }
    </script>
</body>

</html>
